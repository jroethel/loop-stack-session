<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="751px" preserveAspectRatio="none" style="width:634px;height:751px;background:#FAFAFA;" version="1.1" viewBox="0 0 634 751" width="634px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><rect fill="#FAFAFA" height="751" style="stroke:none;stroke-width:1;" width="634" x="0" y="0"/><g class="title" data-source-line="42"><text fill="#1B2631" font-family="Helvetica" font-size="18" font-weight="700" lengthAdjust="spacing" textLength="602.8945" x="15" y="31.708">Three Orthogonal Routing Axes (asked in order 1 -&gt; 2 -&gt; 3)</text></g><!--entity Axis1--><g class="entity" data-qualified-name="Axis1" data-source-line="44" id="ent0001"><rect fill="#EAF2F8" height="149.0625" rx="5" ry="5" style="stroke:#2E86AB;stroke-width:1;" width="427.1006" x="102.897" y="53.9531"/><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="101.6133" x="112.897" y="76.02">AXIS 1 -- SCALE</text><line style="stroke:#2E86AB;stroke-width:1;" x1="103.897" x2="528.9976" y1="79.0859" y2="79.0859"/><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="70.916" x="112.897" y="95.1528">Question:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="221.2856" x="187.9453" y="95.1528">How big / automatable is this job?</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="99.9185" x="112.897" y="110.2856">Answered by:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="74.7119" x="216.9478" y="110.2856">/loop-which</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="275.647" x="112.897" y="125.4185">(7 sliders: size, independence, separation,</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="295.0898" x="112.897" y="140.5513">checkability, judgment, access/consequence,</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="106.2979" x="112.897" y="155.6841">payoff-vs-setup)</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="67.228" x="112.897" y="170.8169">Answers:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="335.7402" x="184.2573" y="170.8169">DON'T BOTHER / CHAT / ONE AGENT / AGENT TEAM</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="62.8291" x="112.897" y="185.9497">Decides:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="244.1499" x="179.8584" y="185.9497">how much of the stack engages at all</text></g><!--entity Axis2--><g class="entity" data-qualified-name="Axis2" data-source-line="46" id="ent0002"><rect fill="#FDEBD0" height="118.7969" rx="5" ry="5" style="stroke:#2E86AB;stroke-width:1;" width="376.6875" x="128.107" y="292.0131"/><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="304.7319" x="138.107" y="314.08">AXIS 2 -- DEPENDENCIES (only if AGENT TEAM)</text><line style="stroke:#2E86AB;stroke-width:1;" x1="129.107" x2="503.7945" y1="317.1459" y2="317.1459"/><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="70.916" x="138.107" y="333.2128">Question:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="208.6538" x="213.1553" y="333.2128">Do units depend on each other?</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="99.9185" x="138.107" y="348.3456">Answered by:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="252.6367" x="242.1578" y="348.3456">the dependency graph in the plan/PRD</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="67.228" x="138.107" y="363.4785">Answers:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="196.8091" x="209.4673" y="363.4785">flat (W=1) / dependent (W&gt;1)</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="62.8291" x="138.107" y="378.6113">Decides:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="220.6445" x="205.0684" y="378.6113">one ringer manifest vs /loop-drive</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="180.4702" x="138.107" y="393.7441">compiling waves with gates</text></g><!--entity Axis3--><g class="entity" data-qualified-name="Axis3" data-source-line="48" id="ent0003"><rect fill="#D5F5E3" height="149.0625" rx="5" ry="5" style="stroke:#2E86AB;stroke-width:1;" width="395.1846" x="118.857" y="485.8131"/><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="375.1846" x="128.857" y="507.88">AXIS 3 -- CHECKABILITY (asked PER UNIT, not per project)</text><line style="stroke:#2E86AB;stroke-width:1;" x1="119.857" x2="513.0415" y1="510.9459" y2="510.9459"/><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="70.916" x="128.857" y="527.0128">Question:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="187.4336" x="203.9053" y="527.0128">Is checking this unit's output</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="175.7856" x="128.857" y="542.1456">cheaper than producing it?</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="99.9185" x="128.857" y="557.2785">Answered by:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="234.292" x="232.9078" y="557.2785">whether an executable check exists</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="211.688" x="128.857" y="572.4113">(exit code, test, render, citation)</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="67.228" x="128.857" y="587.5441">Answers:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="140.8862" x="200.2173" y="587.5441">checkable / judgment</text><text fill="#1B2631" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="62.8291" x="128.857" y="602.6769">Decides:</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="213.5161" x="195.8184" y="602.6769">ringer task on a cheap engine vs</text><text fill="#1B2631" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="334.5532" x="128.857" y="617.8097">staying in the orchestrator's frontier judgment lane</text></g><g class="entity" data-qualified-name="GMN6" data-source-line="54" id="ent0007"><path d="M176.547,700.8731 L176.547,731.1388 A5,5 0 0 0 181.547,736.1388 L451.3536,736.1388 A5,5 0 0 0 456.3536,731.1388 L456.3536,705.8731 L446.3536,695.8731 L320.447,695.8731 L316.447,635.0231 L312.447,695.8731 L181.547,695.8731 A5,5 0 0 0 176.547,700.8731" fill="#FCF3CF" style="stroke:#D4AC0D;stroke-width:1;"/><path d="M446.3536,695.8731 L446.3536,703.3731 A2.5,2.5 0 0 0 448.8536,705.8731 L456.3536,705.8731 L446.3536,695.8731" fill="#FCF3CF" style="stroke:#D4AC0D;stroke-width:1;"/><text fill="#7D6608" font-family="Helvetica" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="87.769" x="182.547" y="712.94">Key insight:</text><text fill="#7D6608" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="166.9053" x="274.4483" y="712.94">Real PRDs are mixtures --</text><text fill="#7D6608" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="232.375" x="182.547" y="728.0728">Axis 3 routes each unit individually.</text></g><!--link Axis1 to Axis2--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="50" id="lnk4"><path d="M316.447,203.3631 C316.447,232.0831 316.447,259.5331 316.447,286.6231" fill="none" id="Axis1-to-Axis2" style="stroke:#34495E;stroke-width:1;"/><polygon fill="#34495E" points="316.447,291.6231,320.447,282.6231,316.447,286.6231,312.447,282.6231,316.447,291.6231" style="stroke:#34495E;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#34495E" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="85.2422" x="334.4538" y="245.1518">2. asked next,</text><text fill="#34495E" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="119.2559" x="317.447" y="259.1205">only if AGENT TEAM</text></g><!--link Axis2 to Axis3--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="51" id="lnk5"><path d="M316.447,411.1631 C316.447,434.3431 316.447,456.2331 316.447,480.6931" fill="none" id="Axis2-to-Axis3" style="stroke:#34495E;stroke-width:1;"/><polygon fill="#34495E" points="316.447,485.6931,320.447,476.6931,316.447,480.6931,312.447,476.6931,316.447,485.6931" style="stroke:#34495E;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#34495E" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="101.6309" x="317.447" y="452.9518">3. asked per unit</text></g><?plantuml-src ZLPTS-8s57tthxXD7pPXO0Cu0PAPRiVOSiFiBiacT